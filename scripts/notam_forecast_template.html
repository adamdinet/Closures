<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOTAM x SGP4 Satellite Forecast</title>
<style>
:root {
  --bg:#0d1117; --surface:#161b22; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
  --red:#f85149; --orange:#d29922; --green:#3fb950;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;}
header h1{font-size:16px;font-weight:700;color:var(--accent);}
header .meta{color:var(--muted);font-size:11px;margin-left:auto;}
.tabs{display:flex;gap:4px;padding:10px 24px 0;border-bottom:1px solid var(--border);background:var(--surface);}
.tab{padding:7px 18px;cursor:pointer;border-radius:6px 6px 0 0;border:1px solid transparent;color:var(--muted);transition:all .15s;font-size:13px;}
.tab:hover{color:var(--text);background:var(--bg);}
.tab.active{color:var(--accent);border-color:var(--border);border-bottom-color:var(--bg);background:var(--bg);}
.panel{display:none;padding:16px 24px;}
.panel.active{display:block;}
.stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 14px;min-width:100px;}
.stat .val{font-size:20px;font-weight:700;color:var(--accent);}
.stat .lbl{color:var(--muted);font-size:11px;margin-top:2px;}
.section-title{font-size:13px;font-weight:600;color:var(--text);margin:16px 0 8px;border-left:3px solid var(--accent);padding-left:10px;}
.filter-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center;}
.filter-row input,.filter-row select{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:5px 10px;border-radius:6px;font-size:12px;outline:none;
}
.filter-row input:focus,.filter-row select:focus{border-color:var(--accent);}
.dl-btn{background:var(--surface);border:1px solid var(--border);color:var(--accent);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;}
.dl-btn:hover{background:var(--border);}
/* Table */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;max-height:380px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;}
th{background:var(--surface);color:var(--muted);font-weight:600;text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:2;}
th:hover{color:var(--text);}
td{padding:5px 10px;border-bottom:1px solid var(--border);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(88,166,255,.05);}
.badge{display:inline-block;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:600;}
.badge-debris{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.3);}
.badge-rocket{background:rgba(210,153,34,.15);color:var(--orange);border:1px solid rgba(210,153,34,.3);}
/* Pagination */
.pager{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.pager button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;}
.pager button:hover{border-color:var(--accent);color:var(--accent);}
.pager button.active{background:var(--accent);color:#000;border-color:var(--accent);}
.pager .pinfo{color:var(--muted);font-size:12px;margin-left:4px;}
/* Gantt */
.gantt-note{color:var(--muted);font-size:11px;margin-bottom:6px;font-style:italic;}
.gantt-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;background:var(--surface);max-height:600px;overflow-y:auto;}
.gantt-container{min-width:900px;}
.gantt-header{display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:3;background:var(--surface);}
.g-label-col{width:240px;min-width:240px;padding:6px 10px;font-weight:600;color:var(--muted);font-size:11px;border-right:1px solid var(--border);}
.g-timeline{flex:1;position:relative;}
.g-ticks{display:flex;height:26px;}
.g-tick{flex:1;border-right:1px solid var(--border);padding:5px 3px;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;}
.g-row{display:flex;border-bottom:1px solid rgba(48,54,61,.5);min-height:24px;}
.g-row:hover{background:rgba(88,166,255,.04);}
.g-row-label{width:240px;min-width:240px;padding:3px 10px;border-right:1px solid var(--border);font-size:11px;color:var(--text);display:flex;align-items:center;overflow:hidden;}
.g-row-label span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.g-row-bars{flex:1;position:relative;height:24px;}
.g-bar{position:absolute;height:12px;top:6px;border-radius:3px;opacity:.85;cursor:pointer;min-width:2px;}
.g-bar:hover{opacity:1;z-index:10;}
.g-bar-debris{background:var(--red);}
.g-bar-rocket{background:var(--orange);}
/* Tooltip */
.tooltip{
  position:fixed;background:#1c2128;border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;font-size:12px;pointer-events:none;
  z-index:9999;max-width:300px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;
}
.tt-title{font-weight:700;color:var(--accent);margin-bottom:5px;}
.tt-row{display:flex;gap:8px;margin-top:3px;}
.tt-key{color:var(--muted);min-width:55px;}
.tt-val{color:var(--text);}
.empty{text-align:center;padding:30px;color:var(--muted);}
</style>
</head>
<body>

<header>
  <div>
    <h1>&#x1F6F0; NOTAM x SGP4 Satellite Forecast</h1>
  </div>
  <div class="meta">Generated: __NOW_ISO__ UTC &nbsp;|&nbsp; SGP4 / 5-min step &nbsp;|&nbsp; 16 NOTAMs</div>
</header>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="24h">24-Hour</div>
  <div class="tab" data-tab="72h">72-Hour</div>
  <div class="tab" data-tab="96h">96-Hour</div>
</div>

<div id="panel-24h" class="panel active"></div>
<div id="panel-72h" class="panel"></div>
<div id="panel-96h" class="panel"></div>

<div class="tooltip" id="tooltip"></div>

<script>
const ALL_DATA = __DATA_JSON__;
const NOW_ISO  = "__NOW_ISO__";
const NOW_MS   = new Date(NOW_ISO).getTime();
const PAGE_SIZE = 500;
const GANTT_MAX = 150;  // max satellites shown in Gantt

// State per tab
const state = {};
['24h','72h','96h'].forEach(l => {
  state[l] = { page: 0, filtered: ALL_DATA[l] || [], sortCol: 5, sortAsc: true };
});

// Tab switching
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
});

// Build panels
['24h','72h','96h'].forEach(label => {
  const rows = ALL_DATA[label] || [];
  const panel = document.getElementById('panel-' + label);
  panel.innerHTML = buildPanelHTML(label, rows);
  attachEvents(label, rows);
});

function buildPanelHTML(label, rows) {
  const hours   = parseInt(label);
  const nSats   = new Set(rows.map(r => r.NORAD_ID)).size;
  const nNotams = new Set(rows.map(r => r.NOTAM)).size;
  const nDebris = rows.filter(r => r.TYPE === 'SPACE DEBRIS').length;
  const nRocket = rows.filter(r => r.TYPE === 'ROCKET LAUNCH').length;

  return `
  <div class="stats">
    <div class="stat"><div class="val">${rows.length.toLocaleString()}</div><div class="lbl">Total Events</div></div>
    <div class="stat"><div class="val">${nSats.toLocaleString()}</div><div class="lbl">Unique Sats</div></div>
    <div class="stat"><div class="val">${nNotams}</div><div class="lbl">NOTAMs Hit</div></div>
    <div class="stat"><div class="val" style="color:var(--red)">${nDebris.toLocaleString()}</div><div class="lbl">Space Debris</div></div>
    <div class="stat"><div class="val" style="color:var(--orange)">${nRocket.toLocaleString()}</div><div class="lbl">Rocket Launch</div></div>
  </div>

  <div class="section-title">Intersection Table</div>
  <div class="filter-row">
    <input type="text" id="search-${label}" placeholder="Search name / NOTAM / region..." style="width:240px">
    <select id="type-filter-${label}">
      <option value="">All Types</option>
      <option value="SPACE DEBRIS">Space Debris</option>
      <option value="ROCKET LAUNCH">Rocket Launch</option>
    </select>
    <select id="notam-filter-${label}">
      <option value="">All NOTAMs</option>
      ${[...new Set(rows.map(r=>r.NOTAM))].sort().map(n=>`<option value="${n}">${n}</option>`).join('')}
    </select>
    <button class="dl-btn" onclick="downloadCSV('${label}')">&#x2B07; CSV</button>
    <span id="row-count-${label}" style="color:var(--muted);font-size:12px;"></span>
  </div>
  <div class="tbl-wrap">
    <table id="tbl-${label}">
      <thead>
        <tr>
          <th onclick="sortTable('${label}',0)">NORAD_ID</th>
          <th onclick="sortTable('${label}',1)">Name</th>
          <th onclick="sortTable('${label}',2)">NOTAM</th>
          <th onclick="sortTable('${label}',3)">Type</th>
          <th onclick="sortTable('${label}',4)">Region</th>
          <th onclick="sortTable('${label}',5)">Enter (UTC)</th>
          <th onclick="sortTable('${label}',6)">Exit (UTC)</th>
        </tr>
      </thead>
      <tbody id="tbody-${label}"></tbody>
    </table>
  </div>
  <div class="pager" id="pager-${label}"></div>

  <div class="section-title">Gantt Chart — Top ${GANTT_MAX} Most Active Satellites</div>
  <div class="gantt-note">Showing top ${GANTT_MAX} satellites by event count. Bars = NOTAM intersection windows.</div>
  <div class="gantt-wrap">
    <div class="gantt-container" id="gantt-${label}"></div>
  </div>
  `;
}

function attachEvents(label, rows) {
  state[label].filtered = rows;
  renderTable(label);
  renderGantt(label, rows);
  document.getElementById('search-' + label).addEventListener('input', () => applyFilter(label));
  document.getElementById('type-filter-' + label).addEventListener('change', () => applyFilter(label));
  document.getElementById('notam-filter-' + label).addEventListener('change', () => applyFilter(label));
}

function applyFilter(label) {
  const q    = document.getElementById('search-' + label).value.toLowerCase();
  const type = document.getElementById('type-filter-' + label).value;
  const notam= document.getElementById('notam-filter-' + label).value;
  const all  = ALL_DATA[label] || [];
  state[label].filtered = all.filter(r => {
    const mq = !q || [r.NORAD_ID, r.NAME, r.NOTAM, r.REGION].some(v => String(v).toLowerCase().includes(q));
    const mt = !type  || r.TYPE  === type;
    const mn = !notam || r.NOTAM === notam;
    return mq && mt && mn;
  });
  state[label].page = 0;
  renderTable(label);
}

function renderTable(label) {
  const s    = state[label];
  const rows = s.filtered;
  const total= rows.length;
  const pages= Math.max(1, Math.ceil(total / PAGE_SIZE));
  const p    = Math.min(s.page, pages - 1);
  const slice= rows.slice(p * PAGE_SIZE, (p+1) * PAGE_SIZE);

  const tbody = document.getElementById('tbody-' + label);
  if (!total) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">No intersections found.</td></tr>';
  } else {
    tbody.innerHTML = slice.map(r => `
      <tr>
        <td>${r.NORAD_ID}</td>
        <td>${r.NAME}</td>
        <td>${r.NOTAM}</td>
        <td><span class="badge ${r.TYPE==='SPACE DEBRIS'?'badge-debris':'badge-rocket'}">${r.TYPE}</span></td>
        <td>${r.REGION}</td>
        <td>${r.ENTER}</td>
        <td>${r.EXIT}</td>
      </tr>`).join('');
  }

  // Count
  const cnt = document.getElementById('row-count-' + label);
  if (cnt) cnt.textContent = total.toLocaleString() + ' rows';

  // Pager
  const pager = document.getElementById('pager-' + label);
  if (!pager) return;
  if (pages <= 1) { pager.innerHTML = ''; return; }
  let btns = '';
  const lo = Math.max(0, p-3), hi = Math.min(pages-1, p+3);
  if (lo > 0) btns += `<button onclick="goPage('${label}',0)">1</button><span style="color:var(--muted)">…</span>`;
  for (let i=lo; i<=hi; i++) {
    btns += `<button class="${i===p?'active':''}" onclick="goPage('${label}',${i})">${i+1}</button>`;
  }
  if (hi < pages-1) btns += `<span style="color:var(--muted)">…</span><button onclick="goPage('${label}',${pages-1})">${pages}</button>`;
  pager.innerHTML = btns + `<span class="pinfo">Page ${p+1} of ${pages} &nbsp;(${PAGE_SIZE}/page)</span>`;
}

function goPage(label, p) {
  state[label].page = p;
  renderTable(label);
  document.getElementById('tbl-' + label).scrollIntoView({behavior:'smooth', block:'nearest'});
}

const FIELDS = ['NORAD_ID','NAME','NOTAM','TYPE','REGION','ENTER','EXIT'];
function sortTable(label, col) {
  const s = state[label];
  if (s.sortCol === col) s.sortAsc = !s.sortAsc;
  else { s.sortCol = col; s.sortAsc = true; }
  const f = FIELDS[col];
  s.filtered = s.filtered.slice().sort((a,b) => {
    const av = String(a[f]), bv = String(b[f]);
    return s.sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  s.page = 0;
  renderTable(label);
}

function downloadCSV(label) {
  const rows = ALL_DATA[label] || [];
  const lines = [FIELDS.join(',')];
  rows.forEach(r => lines.push(FIELDS.map(f => '"' + String(r[f]).replace(/"/g,'""') + '"').join(',')));
  const blob = new Blob([lines.join('\r\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'notam_forecast_' + label + '.csv';
  a.click();
}

// Gantt — top GANTT_MAX sats by event count
function renderGantt(label, rows) {
  const container = document.getElementById('gantt-' + label);
  if (!rows.length) { container.innerHTML = '<div class="empty">No data.</div>'; return; }

  const hours   = parseInt(label);
  const startMs = NOW_MS;
  const endMs   = NOW_MS + hours * 3600000;
  const spanMs  = endMs - startMs;

  // Count events per sat, pick top GANTT_MAX
  const satCount = {};
  rows.forEach(r => { const k = r.NORAD_ID; satCount[k] = (satCount[k]||0)+1; });
  const topNorads = new Set(
    Object.entries(satCount).sort((a,b)=>b[1]-a[1]).slice(0,GANTT_MAX).map(e=>e[0])
  );
  const topRows = rows.filter(r => topNorads.has(String(r.NORAD_ID)));

  // Group by sat
  const satMap = {};
  topRows.forEach(r => {
    const k = r.NORAD_ID + '|' + r.NAME;
    if (!satMap[k]) satMap[k] = {norad:r.NORAD_ID, name:r.NAME, bars:[]};
    satMap[k].bars.push(r);
  });
  const sats = Object.values(satMap);

  // Tick marks — adaptive
  const tickCount = hours <= 24 ? 24 : hours <= 72 ? 18 : 16;
  const tickStepMs = spanMs / tickCount;
  let tickHtml = '';
  for (let i=0; i<=tickCount; i++) {
    const t = new Date(startMs + i * tickStepMs);
    const lbl = t.toISOString().slice(5,16).replace('T',' ')+'Z';
    tickHtml += `<div class="g-tick">${lbl}</div>`;
  }

  let rowsHtml = '';
  sats.forEach(sat => {
    let barsHtml = '';
    sat.bars.forEach(r => {
      const t0 = new Date(r.ENTER).getTime();
      const t1 = new Date(r.EXIT).getTime();
      const left  = Math.max(0,   (t0 - startMs) / spanMs * 100);
      const right = Math.min(100, (t1 - startMs) / spanMs * 100);
      const width = Math.max(0.15, right - left);
      const cls   = r.TYPE === 'SPACE DEBRIS' ? 'g-bar-debris' : 'g-bar-rocket';
      const tip   = encodeURIComponent(JSON.stringify(r));
      barsHtml += `<div class="g-bar ${cls}" style="left:${left.toFixed(2)}%;width:${width.toFixed(2)}%"
        data-tip="${tip}" onmouseenter="showTip(event,this)" onmouseleave="hideTip()"></div>`;
    });
    rowsHtml += `
      <div class="g-row">
        <div class="g-row-label"><span title="${sat.name}">${sat.norad} &mdash; ${sat.name}</span></div>
        <div class="g-row-bars">${barsHtml}</div>
      </div>`;
  });

  container.innerHTML = `
    <div class="gantt-header">
      <div class="g-label-col">Satellite (${sats.length})</div>
      <div class="g-timeline"><div class="g-ticks">${tickHtml}</div></div>
    </div>
    ${rowsHtml}`;
}

// Tooltip
const tooltip = document.getElementById('tooltip');
function showTip(e, el) {
  try {
    const r = JSON.parse(decodeURIComponent(el.dataset.tip));
    tooltip.innerHTML = `
      <div class="tt-title">${r.NAME} (${r.NORAD_ID})</div>
      <div class="tt-row"><span class="tt-key">NOTAM</span><span class="tt-val">${r.NOTAM}</span></div>
      <div class="tt-row"><span class="tt-key">Type</span><span class="tt-val">${r.TYPE}</span></div>
      <div class="tt-row"><span class="tt-key">Region</span><span class="tt-val">${r.REGION}</span></div>
      <div class="tt-row"><span class="tt-key">Enter</span><span class="tt-val">${r.ENTER}</span></div>
      <div class="tt-row"><span class="tt-key">Exit</span><span class="tt-val">${r.EXIT}</span></div>`;
    tooltip.style.display = 'block';
    moveTip(e);
  } catch(ex) {}
}
function moveTip(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
}
function hideTip() { tooltip.style.display = 'none'; }
document.addEventListener('mousemove', e => { if (tooltip.style.display !== 'none') moveTip(e); });
</script>
</body>
</html>
